image: alpine/edge
packages:
  - go
  - golangci-lint
sources:
  - https://github.com/go-ap/storage-fs
secrets:
  - 4f3f5b78-ec70-4a96-a7e4-ea522d87da52
environment:
  GO111MODULE: 'on'
tasks:
  - fmt: |
      cd storage-fs
      test -z $(gofmt -l .)
  - tests: |
      cd storage-fs
      make test
  - benchmarks: |
      cd storage-fs
      make bench
  - coverage: |
      cd storage-fs
      git switch -C master origin/master
      make coverage
      go tool goveralls -flagname unit-tests -service=${CI_NAME} -coverprofile storage-fs.coverprofile -repotokenfile ~/.coveralls.tok
  - lint: |
      cd storage-fs
      golangci-lint run || true
